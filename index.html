<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>情侣聊天-系统版</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{background:#ededed;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{height:56px;background:#f7f7f7;display:flex;justify-content:space-between;align-items:center;padding:0 15px;border-bottom:1px solid #ddd;flex-shrink:0}
.chat{flex:1;overflow-y:auto;padding:10px}
.msg{display:flex;gap:8px;margin:12px 0;align-items:flex-start}
.right{justify-content:flex-end}
.avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;background:#ccc}
.bubble{max-width:65%;padding:10px 12px;border-radius:10px;background:#fff;word-break:break-all;line-height:1.4;font-size:16px}
.right .bubble{background:#95ec69}

/* 消息中的图片样式 */
.msg-img{max-width:150px;max-height:150px;border-radius:8px;object-fit:cover}

/* ✨ 微信样式底部发送栏重构 */
.footer-container{background:#f7f7f7;border-top:1px solid #dddddd;flex-shrink:0;display:flex;flex-direction:column}
.footer{padding:8px 10px;display:flex;align-items:flex-end;gap:8px}

/* 微信的多行自适应文本框 */
.footer textarea{flex:1;height:38px;min-height:38px;max-height:100px;background:#fff;border:none;border-radius:4px;padding:9px 10px;font-size:16px;line-height:20px;resize:none;outline:none;font-family:inherit}

/* 微信风格按钮封装 */
.footer-btn{width:38px;height:38px;border-radius:50%;border:1.5px solid #555;background:transparent;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;flex-shrink:0;padding:0;margin:0;transition:all 0.1s;user-select:none}
.footer-btn:active{opacity:0.6}
.send-btn-wechat{width:60px;height:38px;background:#07c160;color:#fff;border:none;border-radius:4px;font-size:15px;font-weight:bold;display:none;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.send-btn-wechat:active{background:#06ad56}

/* ✨ 新增：功能面板大容器 */
.panel-box{height:0;overflow:hidden;background:#f7f7f7;border-top:0 solid #ddd;transition:height 0.2s ease}
.panel-box.show{height:110px;border-top:1px solid #ddd}

/* ✨ 加号拓展面板内部布局 */
.plus-panel{display:flex;gap:20px;padding:15px 20px}
.panel-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:#666}
.panel-icon{width:50px;height:50px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid #eee}
.panel-icon:active{background:#eaeaea}

/* ✨ 表情包面板内部布局 */
.emoji-panel{padding:10px;display:flex;gap:12px;overflow-x:auto;white-space:nowrap;height:100%;align-items:center}
.emoji-item{width:65px;height:65px;border-radius:6px;object-fit:cover;cursor:pointer;background:#eee;flex-shrink:0;display:inline-block}
.add-emoji-btn{width:65px;height:65px;border-radius:6px;border:2px dashed #bbb;background:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;color:#999;cursor:pointer;flex-shrink:0}

/* 系统级页面公用样式 */
button{cursor:pointer; padding: 4px 8px; margin: 2px;}
.drawer{position:fixed;right:-300px;top:0;width:300px;height:100%;background:#fff;transition:.3s;z-index:10}
.drawer.show{right:0}
.item{padding:16px;border-bottom:1px solid #eee}
.page{position:fixed;left:100%;top:0;width:100%;height:100%;background:#f5f5f5;transition:.3s;overflow:auto;z-index:20}
.page.show{left:0}
.phead{background:#07c160;color:#fff;height:50px;display:flex;align-items:center;padding:0 10px;position:relative}
.back-btn{display:flex;align-items:center;gap:4px;cursor:pointer;padding:8px;border-radius:4px;user-select:none;font-weight:500}
.back-btn:active{background:rgba(255,255,255,0.2)}
.card{background:#fff;margin:10px;padding:12px;border-radius:8px}

/* 分组与滑动框样式 */
.group{border:1px solid #ddd;margin:8px 0;border-radius:6px;overflow:hidden;background:#fff}
.group-header{background:#f9f9f9;padding:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.group-title{font-weight:bold;display:flex;align-items:center;gap:6px}
.group-arrow{transition: transform 0.2s;font-size:12px;color:#999}
.group.open .group-arrow{transform: rotate(90deg)}
.group-content{display:none;padding:8px;border-top:1px solid #eee}
.group.open .group-content{display:block}
.card-list{max-height:180px;overflow-y:auto;margin-top:6px;padding-right:4px}
.card-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f5f5f5}
.small{font-size:12px;color:#666}
</style>
</head>
<body>

<div class="header">
<div id="partnerTitle">对方</div>
<div onclick="menu()">☰</div>
</div>

<div class="chat" id="chat"></div>

<div class="footer-container">
    <div class="footer">
        <button class="footer-btn" id="emojiToggleBtn" onclick="togglePanel('emoji')">☺</button>
        
        <textarea id="txt" placeholder="" rows="1" oninput="handleInput(this)" onclick="closeAllPanels()"></textarea>
        
        <button class="footer-btn" id="plusToggleBtn" onclick="togglePanel('plus')">+</button>
        <button class="send-btn-wechat" id="sendBtn" onclick="sendMe()">发送</button>
    </div>

    <div class="panel-box" id="panelBox">
        <div class="plus-panel" id="plusPanel" style="display:none;">
            <div class="panel-item" onclick="openCards()">
                <div class="panel-icon">🃏</div>
                <div>字卡</div>
            </div>
            <div class="panel-item" onclick="document.getElementById('chatImageInput').click()">
                <div class="panel-icon">🖼️</div>
                <div>照片</div>
            </div>
            <input type="file" id="chatImageInput" accept="image/*" style="display:none" onchange="sendImage(event)">
            
            <div class="panel-item" onclick="alert('语音通话功能开发中...')">
                <div class="panel-icon">📞</div>
                <div>语音通话</div>
            </div>
            <div class="panel-item" onclick="alert('视频通话功能开发中...')">
                <div class="panel-icon">📹</div>
                <div>视频通话</div>
            </div>
        </div>

        <div class="emoji-panel" id="emojiPanel" style="display:none;">
            <div class="add-emoji-btn" onclick="document.getElementById('customEmojiInput').click()">+</div>
            <input type="file" id="customEmojiInput" accept="image/*" style="display:none" onchange="addCustomEmoji(event)">
            <div id="emojiList" style="display:inline-flex;gap:12px;"></div>
        </div>
    </div>
</div>

<div class="drawer" id="drawer">
<div class="item" onclick="openSystem()">⚙️ 系统</div>
<div class="item">💌 书信（待开发）</div>
<div class="item">📍 查岗（待开发）</div>
</div>

<div class="page" id="systemPage">
<div class="phead">
    <div class="back-btn" onclick="closeSystem()">← 系统</div>
</div>

<div class="card">
<h3>修改头像昵称</h3><br>
<div>我的头像</div>
<img id="meAvatarPreview" class="avatar"><br><br>
<input type="file" accept="image/*" onchange="avatarChange(event,'me')"><br><br>

<div>我的昵称</div>
<input id="meName"><br><br>

<div>对方头像</div>
<img id="partnerAvatarPreview" class="avatar"><br><br>
<input type="file" accept="image/*" onchange="avatarChange(event,'partner')"><br><br>

<div>对方昵称</div>
<input id="partnerName"><br><br>

<button onclick="saveProfile()">保存资料</button>
</div>

<div class="card">
<h3>字卡管理</h3><br>
<button onclick="addGroup()">新增分组</button>
<button onclick="document.getElementById('jsonFile').click()">导入JSON文件</button>
<button onclick="exportJSON()">导出JSON文件</button>
<input type="file" id="jsonFile" accept=".json" style="display:none" onchange="importJSON(event)">

<div id="groups"></div>
</div>

<div class="card">
<button onclick="closeSystem()">返回聊天</button>
</div>
</div>

<div class="page" id="cardPage">
<div class="phead">
    <div class="back-btn" onclick="closeCards()">← 对方字卡回复</div>
</div>
<div id="cardArea"></div>
<div class="card"><button onclick="closeCards()">关闭</button></div>
</div>

<script>
let profile=JSON.parse(localStorage.getItem('profile')||'{"me":{"name":"我","avatar":""},"partner":{"name":"对方","avatar":""}}');
let groups=JSON.parse(localStorage.getItem('groups')||'[{"id":1,"name":"情话","cards":["抱抱","想你啦"]}]');
// 表情包从 localStorage 读取，让双方都可以用
let customEmojis=JSON.parse(localStorage.getItem('customEmojis')||'[]');
let openGroupIds=[];
let currentActivePanel = null; // 记录当前打开的是 'plus' 还是 'emoji'

function saveAll(){
localStorage.setItem("profile",JSON.stringify(profile));
localStorage.setItem("groups",JSON.stringify(groups));
localStorage.setItem("customEmojis",JSON.stringify(customEmojis));
}

function menu(){
document.getElementById('drawer').classList.toggle('show');
}

function avatarChange(e,type){
let f=e.target.files[0];
if(!f)return;
let r=new FileReader();
r.onload=function(){
profile[type].avatar=r.result;
renderProfile();
saveAll();
}
r.readAsDataURL(f);
}

function renderProfile(){
meName.value=profile.me.name;
partnerName.value=profile.partner.name;
partnerTitle.innerText=profile.partner.name;

if(profile.me.avatar) meAvatarPreview.src=profile.me.avatar;
if(profile.partner.avatar) partnerAvatarPreview.src=profile.partner.avatar;
}

function saveProfile(){
profile.me.name=meName.value;
profile.partner.name=partnerName.value;
saveAll();
renderProfile();
alert("已保存");
}

function openSystem(){
systemPage.classList.add('show');
drawer.classList.remove('show');
renderGroups();
}

function closeSystem(){
systemPage.classList.remove('show');
}

function addGroup(){
let n=prompt("分组名称");
if(!n)return;
let newId = Date.now();
groups.push({id:newId,name:n,cards:[]});
openGroupIds.push(newId);
saveAll();
renderGroups();
}

function toggleGroup(id){
    let idx = openGroupIds.indexOf(id);
    if(idx > -1){
        openGroupIds.splice(idx, 1);
    } else {
        openGroupIds.push(id);
    }
    renderGroups();
}

function renderGroups(){
let html='';
groups.forEach(g=>{
let isOpen = openGroupIds.includes(g.id) ? 'open' : '';
html+=`
<div class="group ${isOpen}">
<div class="group-header" onclick="toggleGroup(${g.id})">
    <span class="group-title"><span class="group-arrow">▶</span> ${g.name} (${g.cards.length})</span>
    <button onclick="event.stopPropagation();addCard(${g.id})">+字卡</button>
</div>
<div class="group-content">
    <div class="card-list">
    ${g.cards.map((c,i)=>`
    <div class="card-item">
        <span>${c}</span>
        <button onclick="delCard(${g.id},${i})">删除</button>
    </div>`).join('')}
    ${g.cards.length === 0 ? '<div class="small" style="text-align:center;color:#999;padding:10px 0;">暂无字卡，点击右上方可添加</div>':''}
    </div>
</div>
</div>`;
});
groupsEl=document.getElementById('groups');
groupsEl.innerHTML=html;
}

function addCard(id){
let t=prompt("字卡内容");
if(!t)return;
groups.find(x=>x.id===id).cards.push(t);
saveAll();
renderGroups();
}

function delCard(id,i){
groups.find(x=>x.id===id).cards.splice(i,1);
saveAll();
renderGroups();
}

// 导入与导出 JSON 略（保留逻辑）
function importJSON(e) {
    let file = e.target.files[0];
    if (!file) return;
    let reader = new FileReader();
    reader.onload = function(event) {
        try {
            let importedData = JSON.parse(event.target.result);
            let targetGroups = [];
            if (importedData && Array.isArray(importedData.customReplyGroups)) targetGroups = importedData.customReplyGroups;
            else if (Array.isArray(importedData)) targetGroups = importedData;
            else { alert("导入失败"); return; }
            targetGroups.forEach(item => {
                let incomingCards = item.cards || item.items;
                let groupName = item.name;
                if (groupName && Array.isArray(incomingCards)) {
                    let existingGroup = groups.find(g => g.name === groupName);
                    if (existingGroup) { existingGroup.cards = [...new Set([...existingGroup.cards, ...incomingCards])]; }
                    else { groups.push({ id: Date.now() + Math.random(), name: groupName, cards: incomingCards }); }
                }
            });
            saveAll(); renderGroups(); alert("导入成功！");
        } catch (err) { alert("解析失败"); }
        e.target.value = '';
    };
    reader.readAsText(file);
}

function exportJSON() {
    if (!groups || groups.length === 0) return;
    let dataStr = JSON.stringify(groups, null, 4);
    let blob = new Blob([dataStr], { type: "application/json" });
    let url = URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url; a.download = `word_cards_${new Date().toISOString().split('T')[0]}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

/* ✨ 微信核心控制逻辑：面板切换 */
function togglePanel(type) {
    let box = document.getElementById('panelBox');
    let plus = document.getElementById('plusPanel');
    let emoji = document.getElementById('emojiPanel');

    if (currentActivePanel === type) {
        // 如果点的是当前打开的，就关闭它
        closeAllPanels();
    } else {
        // 打开对应的面板
        box.classList.add('show');
        if (type === 'plus') {
            plus.style.display = 'flex';
            emoji.style.display = 'none';
        } else {
            plus.style.display = 'none';
            emoji.style.display = 'flex';
            renderEmojis(); // 展开表情时顺便渲染一下
        }
        currentActivePanel = type;
    }
}

function closeAllPanels() {
    document.getElementById('panelBox').classList.remove('show');
    currentActivePanel = null;
}

// 输入框自适应及按钮智能切换
function handleInput(el) {
    el.style.height = '38px'; 
    let nextHeight = el.scrollHeight;
    if(nextHeight > 38) el.style.height = Math.min(nextHeight, 100) + 'px';
    
    if(el.value.trim().length > 0) {
        plusToggleBtn.style.display = 'none';
        sendBtn.style.display = 'flex';
    } else {
        plusToggleBtn.style.display = 'flex';
        sendBtn.style.display = 'none';
    }
}

// ✨ 表情包管理：从手机本地添加自定义表情
function addCustomEmoji(e) {
    let file = e.target.files[0];
    if (!file) return;
    let reader = new FileReader();
    reader.onload = function(event) {
        customEmojis.push(event.target.result); // 转换为 Base64 存储
        saveAll();
        renderEmojis();
    }
    reader.readAsDataURL(file);
    e.target.value = ''; // 重置
}

// 渲染表情列表
function renderEmojis() {
    let html = customEmojis.map((imgSrc, index) => `
        <img class="emoji-item" src="${imgSrc}" onclick="sendEmoji('${index}')" oncontextmenu="event.preventDefault();deleteEmoji(${index})">
    `).join('');
    document.getElementById('emojiList').innerHTML = html;
}

// 右键/长按可删除不需要的表情包
function deleteEmoji(index) {
    if(confirm("确定要删除这个表情包吗？")) {
        customEmojis.splice(index, 1);
        saveAll();
        renderEmojis();
    }
}

// 发送自定义表情包到聊天框
function sendEmoji(index) {
    let imgSrc = customEmojis[index];
    addMsg("me", `<img class="msg-img" src="${imgSrc}">`, true);
    closeAllPanels();
}

// 从照片功能里直接发送普通聊天图片
function sendImage(e) {
    let file = e.target.files[0];
    if (!file) return;
    let reader = new FileReader();
    reader.onload = function(event) {
        addMsg("me", `<img class="msg-img" src="${event.target.result}">`, true);
        closeAllPanels();
    }
    reader.readAsDataURL(file);
    e.target.value = '';
}

function sendMe(){
let t=txt.value.trim();
if(!t)return;
addMsg("me", t, false);
txt.value="";
txt.style.height = '38px';
plusToggleBtn.style.display = 'flex';
sendBtn.style.display = 'none';
}

// 稍微扩展一下原本的渲染函数，以支持富文本 HTML（用于显示图片和表情）
function addMsg(side, text, isHtml = false){
let d=document.createElement("div");
d.className="msg "+(side==="me"?"right":"");
let av=side==="me"?profile.me.avatar:profile.partner.avatar;
let name=side==="me"?profile.me.name:profile.partner.name;

let contentHtml = isHtml ? text : `<div class="bubble">${text}</div>`;
if(isHtml && text.indexOf('bubble') === -1 && text.indexOf('img') === -1) {
    contentHtml = `<div class="bubble">${text}</div>`;
} else if (isHtml && text.indexOf('img') > -1) {
    // 图片不需要加白底的气泡框，直接显示更逼真
    contentHtml = text;
}

d.innerHTML=`
${side==="other"?'<img class="avatar" src="'+(av||'')+'">':''}
<div>
<div class="small" style="margin-bottom:2px; text-align:${side==='me'?'right':'left'}">${name}</div>
${contentHtml}
</div>
${side==="me"?'<img class="avatar" src="'+(av||'')+'">':''}
`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

function openCards(){
cardPage.classList.add('show');
closeAllPanels();
let html='';
groups.forEach(g=>{
html+=`<div class="card">
    <h3>${g.name} (${g.cards.length})</h3>
    <div style="max-height: 150px; overflow-y: auto; margin-top:6px;">`;
    g.cards.forEach(c=>{
        html+=`<div style="padding:10px 8px;border-bottom:1px solid #eee;cursor:pointer" onclick="sendCard('${c.replace(/'/g,'\\\'')}')">${c}</div>`;
    });
    if(g.cards.length===0){
        html+=`<div class="small" style="color:#999;padding:8px 0;">该分组暂无字卡</div>`;
    }
html+='</div></div>';
});
cardArea.innerHTML = html || '<div class="card" style="text-align:center;color:#999;">请先去系统设置里导入或创建字卡分组</div>';
}

function sendCard(t){
addMsg("other", t, false);
closeCards();
}

function closeCards(){
cardPage.classList.remove('show');
}

// 支持回车发送
document.getElementById('txt').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMe();
    }
});

renderProfile();
</script>
</body>
</html>
