<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>iMessage 风格聊天</title>
<style>
:root {
    --bg-color: #ffffff;
    --text-color: #000000;
    --header-bg: rgba(249, 249, 249, 0.94);
    --border-color: rgba(0, 0, 0, 0.15);
    --bubble-other: #e9e9eb;
    --bubble-other-text: #000000;
    --input-bg: #ffffff;
    --panel-bg: #f2f2f7;
    --time-text: #c7c7cc;
}

body.dark-mode {
    --bg-color: #000000;
    --text-color: #ffffff;
    --header-bg: rgba(28, 28, 30, 0.94);
    --border-color: rgba(255, 255, 255, 0.15);
    --bubble-other: #2c2c2e;
    --bubble-other-text: #ffffff;
    --input-bg: #1c1c1e;
    --panel-bg: #1c1c1e;
    --time-text: #636366;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Helvetica Neue",Helvetica,Arial,sans-serif}
body{background:var(--bg-color);height:100vh;display:flex;flex-direction:column;overflow:hidden;color:var(--text-color);transition: background 0.3s, color 0.3s;}

/* iMessage 顶栏 */
.header{
    height: 60px;
    background: var(--header-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    border-bottom: 0.5px solid var(--border-color);
    flex-shrink: 0;
    z-index: 5;
}
.header-left, .header-right {
    display: flex;
    align-items: center;
    width: 40px;
}
.header-right { justify-content: flex-end; }

.mode-toggle-btn {
    font-size: 20px;
    cursor: pointer;
    user-select: none;
    background: none;
    border: none;
    color: #007aff;
}

.header-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
.header-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    object-fit: cover;
    background: #e5e5ea;
    margin-bottom: 2px;
}
.header-avatar:not([src]), .header-avatar[src=""] { opacity: 0; }

.header-name-box {
    display: flex;
    align-items: center;
    gap: 4px;
}
#partnerNameHeader {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-color);
    line-height: 1.1;
}
.header-arrow {
    font-size: 11px;
    color: #8e8e93;
}

.video-call-btn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
}
.video-call-btn svg {
    width: 26px;
    height: 26px;
    fill: none;
    stroke: #007aff;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
}

/* 聊天主体区域 */
.chat {
    flex: 1;
    overflow-y: auto;
    padding: 12px 12px 20px 12px;
    background: var(--bg-color);
    display: flex;
    flex-direction: column;
}

/* iMessage 消息流 */
.msg {
    display: flex;
    margin-bottom: 10px;
    align-items: flex-end;
    position: relative;
}
.msg.right { flex-direction: row-reverse; }

.msg-body {
    display: flex;
    flex-direction: column;
    max-width: 70%;
    position: relative;
}
.msg.right .msg-body { align-items: flex-end; }

.bubble-container {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    position: relative;
}
.msg.right .bubble-container { flex-direction: row-reverse; }

.bubble {
    padding: 8px 14px;
    border-radius: 18px;
    background: var(--bubble-other);
    color: var(--bubble-other-text);
    font-size: 16px;
    line-height: 1.35;
    word-break: break-word;
    white-space: pre-wrap;
    position: relative;
    max-width: 100%;
}

.msg.right .bubble {
    background: #007aff;
    color: #fff;
}

.tail {
    position: absolute;
    bottom: 0;
    width: 15px;
    height: 18px;
}
.msg:not(.right) .tail { left: -6px; fill: var(--bubble-other); }
.msg.right .tail { right: -6px; fill: #007aff; transform: scaleX(-1); }

.read-status {
    font-size: 13px;
    margin-bottom: 2px;
    white-space: nowrap;
    font-weight: bold;
    user-select: none;
}
.read-status.unread { color: #8e8e93; }
.read-status.read {
    color: #007aff;
    letter-spacing: -3px;
    margin-right: 3px;
}

.msg-time {
    font-size: 10px;
    color: var(--time-text);
    margin-top: 3px;
    text-align: right;
}
.msg:not(.right) .msg-time { text-align: left; }

/* 正在输入中气泡 */
.typing-bubble {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 12px 16px;
    min-width: 56px;
    height: 36px;
}
.typing-dot {
    width: 7px;
    height: 7px;
    background-color: #8e8e93;
    border-radius: 50%;
    animation: typingBounce 1.4s infinite ease-in-out both;
}
.typing-dot:nth-child(1) { animation-delay: -0.32s; }
.typing-dot:nth-child(2) { animation-delay: -0.16s; }
.typing-dot:nth-child(3) { animation-delay: 0s; }

@keyframes typingBounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
}

/* 输入栏及底部面板 */
.footer-container {
    background: var(--header-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 0.5px solid var(--border-color);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
}
.footer {
    padding: 8px 12px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    min-height: 52px;
}

.input-wrapper {
    flex: 1;
    border: 1px solid #c6c6c8;
    background: var(--input-bg);
    border-radius: 20px;
    padding: 6px 12px;
    display: flex;
    align-items: center;
    min-height: 36px;
    max-height: 120px;
}
.input-wrapper textarea {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-size: 16px;
    line-height: 20px;
    resize: none;
    max-height: 100px;
    color: var(--text-color);
}

.btn-icon-ios {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: #e9e9eb;
    color: #007aff;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
}
.btn-icon-ios:active { opacity: 0.6; }

.send-btn-ios {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #007aff;
    border: none;
    color: #fff;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    margin-bottom: 2px;
}
.send-btn-ios svg { width: 14px; height: 14px; fill: #fff; }

.panel-box {
    height: 0;
    overflow: hidden;
    background: var(--panel-bg);
    transition: height 0.2s ease-out;
}
.panel-box.show {
    height: 110px;
    border-top: 0.5px solid var(--border-color);
}
.plus-panel { display: flex; gap: 20px; padding: 12px 16px; overflow-x: auto; }
.panel-item { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; font-size: 11px; color: #8e8e93; flex-shrink: 0; }
.panel-icon { width: 52px; height: 52px; background: var(--input-bg); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

/* 视频通话弹窗 */
.call-modal {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #1c1c1e;
    z-index: 1000;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 80px 20px 60px 20px;
    color: #fff;
}
.call-modal.show { display: flex; }

.call-info { display: flex; flex-direction: column; align-items: center; gap: 12px; }
.call-avatar { width: 100px; height: 100px; border-radius: 24px; object-fit: cover; background: #2c2c2e; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.call-name { font-size: 22px; font-weight: 600; margin-top: 8px; }
.call-status { font-size: 14px; color: #8e8e93; }

.call-actions { display: flex; align-items: center; justify-content: center; gap: 40px; width: 100%; }
.call-btn { width: 60px; height: 60px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 22px; }
.call-btn-mini { background: #2c2c2e; color: #fff; }
.call-btn-hangup { background: #ff3b30; color: #fff; }

/* 页面定义 (设置页/字卡页) */
.page { position: fixed; left: 100%; top: 0; width: 100%; height: 100%; background: var(--panel-bg); transition: .3s; overflow: auto; z-index: 200; color: var(--text-color); }
.page.show { left: 0; }
.phead { background: var(--header-bg); height: 50px; display: flex; align-items: center; padding: 0 10px; border-bottom: 0.5px solid var(--border-color); font-weight: 600; color: #007aff; }
.back-btn { cursor: pointer; font-size: 16px; display: flex; align-items: center; gap: 4px; }

.card { background: var(--input-bg); margin: 12px; padding: 16px; border-radius: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
.card h3 { font-size: 16px; margin-bottom: 12px; }
.card-label { font-size: 13px; color: #8e8e93; margin: 10px 0 4px 0; }
.ios-input { width: 100%; padding: 10px 12px; border: 1px solid #c6c6c8; border-radius: 10px; font-size: 15px; outline: none; background: var(--input-bg); color: var(--text-color); }

.img-style-title { font-size: 13px; color: #6c6c70; margin: 16px 16px 6px 16px; text-transform: uppercase; }
.img-style-box { background: var(--input-bg); border-radius: 12px; margin: 0 12px 12px 12px; overflow: hidden; }
.img-style-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 0.5px solid var(--border-color); min-height: 48px; }
.img-style-row:last-child { border-bottom: none; }
.img-style-slider { flex: 1; margin: 0 12px; -webkit-appearance: none; height: 3px; background: #e5e5ea; border-radius: 2px; }
.img-style-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.2); cursor: pointer; }
.img-style-switch { width: 51px; height: 31px; -webkit-appearance: none; background: #e9e9eb; border-radius: 16px; position: relative; outline: none; cursor: pointer; transition: background 0.2s; }
.img-style-switch:checked { background: #34c759; }
.img-style-switch::before { content: ""; position: absolute; width: 27px; height: 27px; border-radius: 50%; background: #fff; top: 2px; left: 2px; transition: transform 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
.img-style-switch:checked::before { transform: translateX(20px); }

button { padding: 8px 16px; border-radius: 8px; border: 1px solid #c6c6c8; background: var(--input-bg); color: var(--text-color); font-size: 14px; cursor: pointer; }
button.primary-btn { background: #007aff; color: #fff; border: none; font-weight: 600; }
</style>
</head>
<body>

<!-- 顶栏 -->
<div class="header">
    <div class="header-left">
        <button class="mode-toggle-btn" id="modeBtn" onclick="toggleDarkMode()">☀️</button>
    </div>
    
    <div class="header-center">
        <img id="headerAvatar" class="header-avatar">
        <div class="header-name-box">
            <span id="partnerNameHeader">AAA.李泽言</span>
            <span class="header-arrow">></span>
        </div>
    </div>
    
    <div class="header-right">
        <button class="video-call-btn" onclick="startVideoCall()">
            <svg viewBox="0 0 24 24">
                <rect x="2" y="4" width="14" height="16" rx="3"></rect>
                <path d="M16 10l5-3.5v11l-5-3.5z"></path>
            </svg>
        </button>
    </div>
</div>

<!-- 消息区 -->
<div class="chat" id="chat"></div>

<!-- 底部发送栏与扩展功能区 -->
<div class="footer-container">
    <div class="footer">
        <button class="btn-icon-ios" onclick="togglePanel('plus'); event.stopPropagation();">+</button>
        <div class="input-wrapper">
            <textarea id="txt" placeholder="iMessage" rows="1" oninput="handleInput(this)" onclick="closeAllPanels();"></textarea>
        </div>
        <button class="send-btn-ios" id="sendBtn" onclick="sendMe()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>

    <!-- 底部功能扩展面板 -->
    <div class="panel-box" id="panelBox">
        <div class="plus-panel" id="plusPanel">
            <div class="panel-item" onclick="openCards()">
                <div class="panel-icon">🃏</div>
                <div>字卡回复</div>
            </div>
            <div class="panel-item" onclick="openSystem()">
                <div class="panel-icon">⚙️</div>
                <div>系统设置</div>
            </div>
            <div class="panel-item" onclick="openManageCards()">
                <div class="panel-icon">🗂️</div>
                <div>字卡管理</div>
            </div>
            <div class="panel-item" onclick="document.getElementById('chatImageInput').click()">
                <div class="panel-icon">🖼️</div>
                <div>照片</div>
            </div>
            <input type="file" id="chatImageInput" accept="image/*" style="display:none" onchange="sendImage(event)">
        </div>
    </div>
</div>

<!-- 视频通话弹窗 -->
<div class="call-modal" id="callModal">
    <div class="call-info">
        <img id="callAvatar" class="call-avatar">
        <div id="callName" class="call-name">AAA.李泽言</div>
        <div id="callStatus" class="call-status">正在等待接听...</div>
    </div>

    <div class="call-actions">
        <button class="call-btn call-btn-mini" onclick="endVideoCall()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path>
            </svg>
        </button>
        <button class="call-btn call-btn-hangup" onclick="endVideoCall()">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.1-.7-.28-.79-.73-1.68-1.36-2.66-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"></path>
            </svg>
        </button>
    </div>
</div>

<!-- 系统设置页面 -->
<div class="page" id="systemPage">
    <div class="phead"><div class="back-btn" onclick="closeSystem()">❮ 系统设置</div></div>
    
    <div class="img-style-title">回复速度</div>
    <div class="img-style-box">
        <div class="img-style-row">
            <span>最短等待</span>
            <input type="range" id="replyMinSec" class="img-style-slider" min="1" max="30" step="1" oninput="updateSliderView('replyMinSec', this.value+'s')">
            <span id="val_replyMinSec" style="color:#8e8e93;">3s</span>
        </div>
        <div class="img-style-row">
            <span>最长等待</span>
            <input type="range" id="replyMaxMin" class="img-style-slider" min="0.5" max="10" step="0.5" oninput="updateSliderView('replyMaxMin', this.value+'分钟')">
            <span id="val_replyMaxMin" style="color:#8e8e93;">1.5分钟</span>
        </div>
    </div>

    <div class="card">
        <h3>👤 个人资料</h3>
        <div class="card-label">我的头像</div>
        <input type="file" accept="image/*" onchange="avatarChange(event,'me')"><br>
        <div class="card-label">我的昵称</div>
        <input type="text" id="meName" class="ios-input"><br>
        <div class="card-label">对方头像</div>
        <input type="file" accept="image/*" onchange="avatarChange(event,'partner')"><br>
        <div class="card-label">对方昵称</div>
        <input type="text" id="partnerName" class="ios-input"><br><br>
        <button class="primary-btn" style="width:100%;" onclick="saveProfile()">保存个人资料</button>
    </div>
</div>

<!-- 字卡管理页面 -->
<div class="page" id="manageCardsPage">
    <div class="phead"><div class="back-btn" onclick="closeManageCards()">❮ 字卡管理</div></div>
    <div class="card">
        <h3>字卡库操作</h3><br>
        <button onclick="addGroup()">新增分组</button>
        <button onclick="document.getElementById('jsonFile').click()">导入JSON</button>
        <button onclick="exportJSON()">导出JSON</button>
        <input type="file" id="jsonFile" accept=".json" style="display:none" onchange="importJSON(event)">
        <div id="groups" style="margin-top:15px;"></div>
    </div>
</div>

<!-- 快速发送字卡选择页 -->
<div class="page" id="cardPage">
    <div class="phead"><div class="back-btn" onclick="closeCards()">❮ 选择字卡</div></div>
    <div id="cardArea"></div>
</div>

<script>
let profile=JSON.parse(localStorage.getItem('profile')||'{"me":{"name":"我","avatar":""},"partner":{"name":"AAA.李泽言","avatar":""}}');
let groups=JSON.parse(localStorage.getItem('groups')||'[{"id":1,"name":"情话","cards":["抱抱","想你啦"]}]');
let freqSettings=JSON.parse(localStorage.getItem('freqSettings')||'{"maxComboLines":3,"replyMinSec":3,"replyMaxMin":1.5,"activeMaxMin":5,"activeToggle":true,"mergeCardsToggle":true}');
let chatHistory=JSON.parse(localStorage.getItem('chatHistory')||'[]');

let currentActivePanel = false;
let typingBubbleElement = null; 
let isDarkMode = false;

let callTimer = null;
let callDuration = 0;
let callInterval = null;

const tailSvg = `<svg class="tail" viewBox="0 0 15 18"><path d="M15,18 C9,18 0,13 0,0 C4,8 10,12 15,12 Z"></path></svg>`;

function saveAll(){
    localStorage.setItem("profile",JSON.stringify(profile));
    localStorage.setItem("groups",JSON.stringify(groups));
    localStorage.setItem("freqSettings",JSON.stringify(freqSettings));
    localStorage.setItem("chatHistory",JSON.stringify(chatHistory)); 
}

function toggleDarkMode() {
    isDarkMode = !isDarkMode;
    document.body.classList.toggle('dark-mode', isDarkMode);
    document.getElementById('modeBtn').innerText = isDarkMode ? '🌙' : '☀️';
}

function updateSliderView(id, text) { document.getElementById('val_' + id).innerText = text; }

function avatarChange(e,type){
    let f=e.target.files[0];
    if(!f)return;
    let r=new FileReader();
    r.onload=function(){
        profile[type].avatar=r.result;
        renderProfile();
        saveAll();
        renderChatFromHistory(); 
    }
    r.readAsDataURL(f);
}

function renderProfile(){
    if(document.getElementById('meName')) meName.value=profile.me.name;
    if(document.getElementById('partnerName')) partnerName.value=profile.partner.name;
    partnerNameHeader.innerText=profile.partner.name;
    if(profile.partner.avatar) headerAvatar.src=profile.partner.avatar;
}

function saveProfile(){
    profile.me.name=meName.value;
    profile.partner.name=partnerName.value;
    saveAll(); renderProfile(); renderChatFromHistory();
    alert("资料保存成功");
}

function renderChatFromHistory() {
    chat.innerHTML = "";
    chatHistory.forEach(item => {
        let d=document.createElement("div");
        d.className="msg "+(item.side==="me"?"right":"");

        let contentHtml = (item.isHtml) ? item.text : `<div class="bubble">${item.text}${tailSvg}</div>`;
        
        let statusHtml = '';
        if (item.side === "me") {
            let isRead = item.status === '已读';
            let iconClass = isRead ? 'read-status read' : 'read-status unread';
            let iconSymbol = isRead ? '✓✓' : '✓';
            statusHtml = `<span class="${iconClass}">${iconSymbol}</span>`;
        }
        
        let timeDisplayHtml = item.time ? `<div class="msg-time">${item.time}</div>` : '';

        d.innerHTML=`
        <div class="msg-body">
            <div class="bubble-container">${contentHtml}</div>
            ${statusHtml}
            ${timeDisplayHtml}
        </div>
        `;
        chat.appendChild(d);
    });
    chat.scrollTop=chat.scrollHeight;
}

function openSystem(){ systemPage.classList.add('show'); closeAllPanels(); renderProfile(); }
function closeSystem(){ systemPage.classList.remove('show'); }
function openManageCards(){ manageCardsPage.classList.add('show'); closeAllPanels(); renderGroups(); }
function closeManageCards(){ manageCardsPage.classList.remove('show'); }

function startVideoCall() {
    let modal = document.getElementById('callModal');
    let avatar = document.getElementById('callAvatar');
    let name = document.getElementById('callName');
    let status = document.getElementById('callStatus');

    name.innerText = profile.partner.name || "对方";
    if (profile.partner.avatar) avatar.src = profile.partner.avatar;

    status.innerText = "正在等待接听...";
    modal.classList.add('show');

    callTimer = setTimeout(() => {
        let isAnswered = Math.random() < 0.5;
        if (isAnswered) {
            status.innerText = "00:00";
            callDuration = 0;
            callInterval = setInterval(() => {
                callDuration++;
                let mins = String(Math.floor(callDuration / 60)).padStart(2, '0');
                let secs = String(callDuration % 60).padStart(2, '0');
                status.innerText = `${mins}:${secs}`;
            }, 1000);
        } else {
            status.innerText = "对方无应答";
            setTimeout(() => { endVideoCall(); }, 1500);
        }
    }, 3000);
}

function endVideoCall() {
    let modal = document.getElementById('callModal');
    modal.classList.remove('show');
    if (callTimer) clearTimeout(callTimer);
    if (callInterval) clearInterval(callInterval);
    callTimer = null;
    callInterval = null;
}

function togglePanel(type) {
    let box = document.getElementById('panelBox');
    if (currentActivePanel) {
        closeAllPanels();
    } else {
        box.classList.add('show');
        currentActivePanel = true;
        setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 150);
    }
}

function closeAllPanels() {
    document.getElementById('panelBox').classList.remove('show');
    currentActivePanel = false;
}

function handleInput(el) {
    sendBtn.style.display = (el.value.trim().length > 0) ? 'flex' : 'none';
}

function sendMe(){
    let t=txt.value.trim();
    if(!t)return;
    addMsg("me",t);
    txt.value="";
    sendBtn.style.display = 'none';
}

function addMsg(side,text,isHtml=false){
    let uniqueStatusId = "status_" + Date.now();
    let now = new Date();
    let timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    
    let msgObj = { side, text, isHtml, statusId: uniqueStatusId, status: '未读', time: timeStr };
    chatHistory.push(msgObj);
    saveAll(); 

    let d=document.createElement("div");
    d.className="msg "+(side==="me"?"right":"");

    let contentHtml = (isHtml && text.indexOf('img') > -1) ? text : `<div class="bubble">${text}${tailSvg}</div>`;
    let statusHtml = (side === "me") ? `<span class="read-status unread" id="${uniqueStatusId}">✓</span>` : '';

    d.innerHTML=`
    <div class="msg-body">
        <div class="bubble-container">${contentHtml}</div>
        ${statusHtml}
        <div class="msg-time">${timeStr}</div>
    </div>
    `;
    chat.appendChild(d);
    chat.scrollTop=chat.scrollHeight;

    if (side === "me") {
        let randomDelay = Math.floor(Math.random() * 3 + 2) * 1000;
        setTimeout(function() {
            let statusEl = document.getElementById(uniqueStatusId);
            if (statusEl) {
                statusEl.className = "read-status read";
                statusEl.innerText = "✓✓";
                let target = chatHistory.find(h => h.statusId === uniqueStatusId);
                if(target) target.status = '已读';
                saveAll();
                triggerAdvancedAutoReply();
            }
        }, randomDelay);
    }
}

function showTypingBubble() {
    if (typingBubbleElement) return;
    typingBubbleElement = document.createElement("div");
    typingBubbleElement.className = "msg";
    typingBubbleElement.innerHTML = `
        <div class="msg-body">
            <div class="bubble-container">
                <div class="bubble typing-bubble">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    ${tailSvg}
                </div>
            </div>
        </div>
    `;
    chat.appendChild(typingBubbleElement);
    chat.scrollTop = chat.scrollHeight;
}

function hideTypingBubble() {
    if (typingBubbleElement) {
        chat.removeChild(typingBubbleElement);
        typingBubbleElement = null;
    }
}

function triggerAdvancedAutoReply() {
    let allCards = [];
    groups.forEach(g => { if (g.cards) allCards = allCards.concat(g.cards); });
    if (allCards.length === 0) return;

    let userMaxLines = parseInt(freqSettings.maxComboLines) || 3;
    let bubbleCount = Math.floor(Math.random() * userMaxLines) + 1; 

    let bubbleQueue = [];
    for (let b = 0; b < bubbleCount; b++) {
        let cardsInBubbleCount = (freqSettings.mergeCardsToggle !== false) ? (Math.floor(Math.random() * 3) + 1) : 1; 
        let chosenCards = [];
        for (let c = 0; c < cardsInBubbleCount; c++) {
            chosenCards.push(allCards[Math.floor(Math.random() * allCards.length)]);
        }
        bubbleQueue.push(chosenCards.join(' '));
    }

    sendQueueItem(bubbleQueue, 0, 1500);
}

function sendQueueItem(queue, index, delayTime) {
    if (index >= queue.length) return;
    setTimeout(function() {
        showTypingBubble();

        setTimeout(function() {
            hideTypingBubble();
            addMsg("other", queue[index]);
            if (index + 1 < queue.length) {
                sendQueueItem(queue, index + 1, 1200);
            }
        }, 1500);
    }, delayTime);
}

function openCards(){
    cardPage.classList.add('show');
    closeAllPanels();
    let html='';
    groups.forEach(g=>{
        html+=`<div class="card"><h3>${g.name}</h3>`;
        g.cards.forEach(c=>{
            html+=`<div style="padding:10px 0;border-bottom:0.5px solid #e5e5ea;cursor:pointer" onclick="sendCard('${c}')">${c}</div>`;
        });
        html+='</div>';
    });
    cardArea.innerHTML = html;
}
function sendCard(t){ addMsg("other",t); closeCards(); }
function closeCards(){ cardPage.classList.remove('show'); }

renderProfile();
renderChatFromHistory();
</script>
</body>
</html>
