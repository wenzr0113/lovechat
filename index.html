<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>iMessage 风格聊天</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Helvetica Neue",Helvetica,Arial,sans-serif}
body{background:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden;color:#000}

/* iMessage 顶栏 */
.header{
    height: 60px;
    background: rgba(249, 249, 249, 0.94);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    border-bottom: 0.5px solid rgba(0, 0, 0, 0.15);
    flex-shrink: 0;
    z-index: 5;
}
.header-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}
.header-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    object-fit: cover;
    background: #e5e5ea;
    margin-bottom: 2px;
}
.header-avatar:not([src]), .header-avatar[src=""] { opacity: 0; }
#partnerTitle {
    font-size: 11px;
    color: #8e8e93;
    font-weight: 400;
}
#partnerNameHeader {
    font-size: 13px;
    font-weight: 600;
    color: #000;
    line-height: 1.1;
}
.menu-btn {
    font-size: 20px;
    color: #007aff;
    cursor: pointer;
    user-select: none;
}

/* 聊天主体区域 */
.chat {
    flex: 1;
    overflow-y: auto;
    padding: 12px 12px 20px 12px;
    background: #fff;
    display: flex;
    flex-direction: column;
}

/* iMessage 消息流 */
.msg {
    display: flex;
    margin-bottom: 10px;
    align-items: flex-end;
    position: relative;
}
.msg.right {
    flex-direction: row-reverse;
}

.msg-body {
    display: flex;
    flex-direction: column;
    max-width: 70%;
    position: relative;
}
.msg.right .msg-body {
    align-items: flex-end;
}

.bubble-container {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    position: relative;
}
.msg.right .bubble-container {
    flex-direction: row-reverse;
}

/* iMessage 经典气泡 */
.bubble {
    padding: 8px 14px;
    border-radius: 18px;
    background: #e9e9eb;
    color: #000;
    font-size: 16px;
    line-height: 1.35;
    word-break: break-word;
    white-space: pre-wrap;
    position: relative;
    max-width: 100%;
}

/* 发送方蓝色气泡 */
.msg.right .bubble {
    background: #007aff;
    color: #fff;
}

/* 气泡尾巴 (SVG 绘制圆滑尾巴) */
.tail {
    position: absolute;
    bottom: 0;
    width: 15px;
    height: 18px;
}
.msg:not(.right) .tail {
    left: -6px;
    fill: #e9e9eb;
}
.msg.right .tail {
    right: -6px;
    fill: #007aff;
    transform: scaleX(-1);
}

/* 状态标记：勾选符号（单勾未读、双勾已读） */
.read-status {
    font-size: 13px;
    margin-bottom: 2px;
    white-space: nowrap;
    font-weight: bold;
    user-select: none;
}
.read-status.unread {
    color: #8e8e93; /* 未读：灰色单勾 */
}
.read-status.read {
    color: #007aff; /* 已读：蓝色双勾 */
    letter-spacing: -3px; /* 紧凑排列形成双勾效果 */
    margin-right: 3px;
}

.msg-time {
    font-size: 10px;
    color: #c7c7cc;
    margin-top: 3px;
    text-align: right;
}
.msg:not(.right) .msg-time {
    text-align: left;
}

/* 正在输入中——三点浮动气泡样式 */
.typing-bubble {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 12px 16px;
    min-width: 56px;
    height: 36px;
}
.typing-dot {
    width: 7px;
    height: 7px;
    background-color: #8e8e93;
    border-radius: 50%;
    animation: typingBounce 1.4s infinite ease-in-out both;
}
.typing-dot:nth-child(1) { animation-delay: -0.32s; }
.typing-dot:nth-child(2) { animation-delay: -0.16s; }
.typing-dot:nth-child(3) { animation-delay: 0s; }

@keyframes typingBounce {
    0%, 80%, 100% {
        transform: translateY(0);
        opacity: 0.4;
    }
    40% {
        transform: translateY(-6px);
        opacity: 1;
    }
}

/* iMessage 悬浮输入栏 */
.footer-container {
    background: rgba(249, 249, 249, 0.94);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 0.5px solid rgba(0, 0, 0, 0.15);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
}
.footer {
    padding: 8px 12px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    min-height: 52px;
}

.input-wrapper {
    flex: 1;
    border: 1px solid #c6c6c8;
    background: #fff;
    border-radius: 20px;
    padding: 6px 12px;
    display: flex;
    align-items: center;
    min-height: 36px;
    max-height: 120px;
}
.input-wrapper textarea {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-size: 16px;
    line-height: 20px;
    resize: none;
    max-height: 100px;
}

.btn-icon-ios {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: #e9e9eb;
    color: #007aff;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
}
.btn-icon-ios:active { opacity: 0.6; }

.send-btn-ios {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #007aff;
    border: none;
    color: #fff;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    margin-bottom: 2px;
}
.send-btn-ios svg { width: 14px; height: 14px; fill: #fff; }

/* 展开功能面板 */
.panel-box {
    height: 0;
    overflow: hidden;
    background: #f2f2f7;
    transition: height 0.2s ease-out;
}
.panel-box.show {
    height: 120px;
    border-top: 0.5px solid rgba(0, 0, 0, 0.1);
}
.plus-panel {
    display: flex;
    gap: 24px;
    padding: 16px 20px;
    overflow-x: auto;
}
.panel-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-size: 11px;
    color: #8e8e93;
}
.panel-icon {
    width: 52px;
    height: 52px;
    background: #fff;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.emoji-panel {
    padding: 12px;
    display: flex;
    gap: 12px;
    overflow-x: auto;
    align-items: center;
    height: 100%;
}
.add-emoji-btn {
    width: 60px;
    height: 60px;
    border-radius: 12px;
    border: 2px dashed #c7c7cc;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: #8e8e93;
    cursor: pointer;
}

/* 抽屉菜单与设置页面 */
.drawer { position: fixed; right: -300px; top: 0; width: 300px; height: 100%; background: #fff; transition: .3s; z-index: 100; box-shadow: -4px 0 20px rgba(0,0,0,0.1); }
.drawer.show { right: 0; }
.drawer-back { background: #f2f2f7; font-weight: 600; color: #007aff; }
.item { padding: 16px; border-bottom: 0.5px solid #e5e5ea; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 16px; }

.page { position: fixed; left: 100%; top: 0; width: 100%; height: 100%; background: #f2f2f7; transition: .3s; overflow: auto; z-index: 200; }
.page.show { left: 0; }
.phead { background: rgba(249, 249, 249, 0.94); height: 50px; display: flex; align-items: center; padding: 0 10px; border-bottom: 0.5px solid #c6c6c8; font-weight: 600; color: #007aff; }
.back-btn { cursor: pointer; font-size: 16px; display: flex; align-items: center; gap: 4px; }

.card { background: #fff; margin: 12px; padding: 16px; border-radius: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
.card h3 { font-size: 16px; margin-bottom: 12px; }
.card-label { font-size: 13px; color: #8e8e93; margin: 10px 0 4px 0; }
.ios-input { width: 100%; padding: 10px 12px; border: 1px solid #c6c6c8; border-radius: 10px; font-size: 15px; outline: none; }
.ios-input:focus { border-color: #007aff; }

.img-style-title { font-size: 13px; color: #6c6c70; margin: 16px 16px 6px 16px; text-transform: uppercase; }
.img-style-box { background: #fff; border-radius: 12px; margin: 0 12px 12px 12px; overflow: hidden; }
.img-style-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 0.5px solid #e5e5ea; min-height: 48px; }
.img-style-row:last-child { border-bottom: none; }
.img-style-slider { flex: 1; margin: 0 12px; -webkit-appearance: none; height: 3px; background: #e5e5ea; border-radius: 2px; }
.img-style-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.2); cursor: pointer; }
.img-style-switch { width: 51px; height: 31px; -webkit-appearance: none; background: #e9e9eb; border-radius: 16px; position: relative; outline: none; cursor: pointer; transition: background 0.2s; }
.img-style-switch:checked { background: #34c759; }
.img-style-switch::before { content: ""; position: absolute; width: 27px; height: 27px; border-radius: 50%; background: #fff; top: 2px; left: 2px; transition: transform 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
.img-style-switch:checked::before { transform: translateX(20px); }

button { padding: 8px 16px; border-radius: 8px; border: 1px solid #c6c6c8; background: #fff; font-size: 14px; cursor: pointer; }
button.primary-btn { background: #007aff; color: #fff; border: none; font-weight: 600; }
</style>
</head>
<body>

<!-- 头部 -->
<div class="header">
    <div style="width:30px;"></div>
    <div class="header-center" onclick="openSystem()">
        <img id="headerAvatar" class="header-avatar">
        <div id="partnerNameHeader">对方</div>
        <div id="partnerTitle">iMessage</div>
    </div>
    <div class="menu-btn" onclick="menu(event)">⋯</div>
</div>

<!-- 消息区 -->
<div class="chat" id="chat" onclick="closeMenu()"></div>

<!-- 底部发送栏 -->
<div class="footer-container" onclick="closeMenu()">
    <div class="footer">
        <button class="btn-icon-ios" onclick="togglePanel('plus'); event.stopPropagation();">+</button>
        <button class="btn-icon-ios" id="emojiToggleBtn" onclick="togglePanel('emoji'); event.stopPropagation();" style="font-size: 18px;">☺</button>
        <div class="input-wrapper">
            <textarea id="txt" placeholder="iMessage" rows="1" oninput="handleInput(this)" onclick="closeAllPanels(); closeMenu();"></textarea>
        </div>
        <button class="send-btn-ios" id="sendBtn" onclick="sendMe()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>

    <!-- 功能扩展面板 -->
    <div class="panel-box" id="panelBox">
        <div class="plus-panel" id="plusPanel" style="display:none;">
            <div class="panel-item" onclick="openCards()">
                <div class="panel-icon">🃏</div>
                <div>字卡回复</div>
            </div>
            <div class="panel-item" onclick="document.getElementById('chatImageInput').click()">
                <div class="panel-icon">🖼️</div>
                <div>照片</div>
            </div>
            <input type="file" id="chatImageInput" accept="image/*" style="display:none" onchange="sendImage(event)">
        </div>

        <div class="emoji-panel" id="emojiPanel" style="display:none;">
            <div class="add-emoji-btn" onclick="document.getElementById('customEmojiInput').click()">+</div>
            <input type="file" id="customEmojiInput" accept="image/*" style="display:none" onchange="addCustomEmoji(event)">
            <div id="emojiList" style="display:inline-flex;gap:12px;"></div>
        </div>
    </div>
</div>

<!-- 抽屉菜单 -->
<div class="drawer" id="drawer">
    <div class="item drawer-back" onclick="closeMenu()">❮ 返回</div>
    <div class="item" onclick="openSystem()">⚙️ 系统设置</div>
    <div class="item" onclick="openManageCards()">🃏 字卡管理</div>
</div>

<!-- 设置页面 -->
<div class="page" id="systemPage">
    <div class="phead"><div class="back-btn" onclick="closeSystem()">❮ 系统设置</div></div>
    
    <div class="img-style-title">回复速度</div>
    <div class="img-style-box">
        <div class="img-style-row">
            <span>最短等待</span>
            <input type="range" id="replyMinSec" class="img-style-slider" min="1" max="30" step="1" oninput="updateSliderView('replyMinSec', this.value+'s')">
            <span id="val_replyMinSec" style="color:#8e8e93;">3s</span>
        </div>
        <div class="img-style-row">
            <span>最长等待</span>
            <input type="range" id="replyMaxMin" class="img-style-slider" min="0.5" max="10" step="0.5" oninput="updateSliderView('replyMaxMin', this.value+'分钟')">
            <span id="val_replyMaxMin" style="color:#8e8e93;">1.5分钟</span>
        </div>
    </div>

    <div class="img-style-title">主动发送</div>
    <div class="img-style-box">
        <div class="img-style-row">
            <span>主动发消息给我</span>
            <input type="checkbox" id="activeToggle" class="img-style-switch">
        </div>
        <div class="img-style-row">
            <span>间隔</span>
            <input type="range" id="activeMaxMin" class="img-style-slider" min="1" max="30" step="1" oninput="updateSliderView('activeMaxMin', this.value+'分钟')">
            <span id="val_activeMaxMin" style="color:#8e8e93;">5分钟</span>
        </div>
    </div>

    <div class="img-style-title">字卡设置</div>
    <div class="img-style-box">
        <div class="img-style-row">
            <span>拼接字卡 (空格分隔)</span>
            <input type="checkbox" id="mergeCardsToggle" class="img-style-switch">
        </div>
    </div>

    <div class="card">
        <div class="card-label">连发条数 (1-7)</div>
        <input type="number" id="maxComboLines" class="ios-input" min="1" max="7"><br><br>
        <button class="primary-btn" style="width:100%;" onclick="saveFrequencySettings()">保存参数设置</button>
    </div>

    <div class="card">
        <h3>👤 个人资料</h3>
        <div class="card-label">我的头像</div>
        <input type="file" accept="image/*" onchange="avatarChange(event,'me')"><br>
        <div class="card-label">我的昵称</div>
        <input type="text" id="meName" class="ios-input"><br>
        <div class="card-label">对方头像</div>
        <input type="file" accept="image/*" onchange="avatarChange(event,'partner')"><br>
        <div class="card-label">对方昵称</div>
        <input type="text" id="partnerName" class="ios-input"><br><br>
        <button class="primary-btn" style="width:100%;" onclick="saveProfile()">保存个人资料</button>
    </div>
</div>

<!-- 字卡管理页面 -->
<div class="page" id="manageCardsPage">
    <div class="phead"><div class="back-btn" onclick="closeManageCards()">❮ 字卡管理</div></div>
    <div class="card">
        <h3>字卡库操作</h3><br>
        <button onclick="addGroup()">新增分组</button>
        <button onclick="document.getElementById('jsonFile').click()">导入JSON</button>
        <button onclick="exportJSON()">导出JSON</button>
        <input type="file" id="jsonFile" accept=".json" style="display:none" onchange="importJSON(event)">
        <div id="groups" style="margin-top:15px;"></div>
    </div>
</div>

<!-- 快速发送字卡页面 -->
<div class="page" id="cardPage">
    <div class="phead"><div class="back-btn" onclick="closeCards()">❮ 选择字卡</div></div>
    <div id="cardArea"></div>
</div>

<script>
let profile=JSON.parse(localStorage.getItem('profile')||'{"me":{"name":"我","avatar":""},"partner":{"name":"对方","avatar":""}}');
let groups=JSON.parse(localStorage.getItem('groups')||'[{"id":1,"name":"情话","cards":["抱抱","想你啦"]}]');
let freqSettings=JSON.parse(localStorage.getItem('freqSettings')||'{"maxComboLines":3,"replyMinSec":3,"replyMaxMin":1.5,"activeMaxMin":5,"activeToggle":true,"mergeCardsToggle":true}');
let chatHistory=JSON.parse(localStorage.getItem('chatHistory')||'[]');

let currentActivePanel = null;
let activeMsgTimer = null; 
let typingBubbleElement = null; // 输入中气泡引用

const tailSvg = `<svg class="tail" viewBox="0 0 15 18"><path d="M15,18 C9,18 0,13 0,0 C4,8 10,12 15,12 Z"></path></svg>`;

function saveAll(){
    localStorage.setItem("profile",JSON.stringify(profile));
    localStorage.setItem("groups",JSON.stringify(groups));
    localStorage.setItem("freqSettings",JSON.stringify(freqSettings));
    localStorage.setItem("chatHistory",JSON.stringify(chatHistory)); 
}

function menu(event){ event.stopPropagation(); document.getElementById('drawer').classList.toggle('show'); }
function closeMenu(){ document.getElementById('drawer').classList.remove('show'); }

function avatarChange(e,type){
    let f=e.target.files[0];
    if(!f)return;
    let r=new FileReader();
    r.onload=function(){
        profile[type].avatar=r.result;
        renderProfile();
        saveAll();
        renderChatFromHistory(); 
    }
    r.readAsDataURL(f);
}

function updateSliderView(id, text) { document.getElementById('val_' + id).innerText = text; }

function renderProfile(){
    meName.value=profile.me.name;
    partnerName.value=profile.partner.name;
    partnerNameHeader.innerText=profile.partner.name;
    if(profile.partner.avatar) headerAvatar.src=profile.partner.avatar;

    document.getElementById('maxComboLines').value = freqSettings.maxComboLines || 3;
    document.getElementById('replyMinSec').value = freqSettings.replyMinSec || 3;
    updateSliderView('replyMinSec', (freqSettings.replyMinSec || 3) + 's');
    document.getElementById('replyMaxMin').value = freqSettings.replyMaxMin || 1.5;
    updateSliderView('replyMaxMin', (freqSettings.replyMaxMin || 1.5) + '分钟');
    document.getElementById('activeMaxMin').value = freqSettings.activeMaxMin || 5;
    updateSliderView('activeMaxMin', (freqSettings.activeMaxMin || 5) + '分钟');

    document.getElementById('activeToggle').checked = freqSettings.activeToggle !== false;
    document.getElementById('mergeCardsToggle').checked = freqSettings.mergeCardsToggle !== false;
}

function saveProfile(){
    profile.me.name=meName.value;
    profile.partner.name=partnerName.value;
    saveAll(); renderProfile(); renderChatFromHistory();
    alert("资料保存成功");
}

function saveFrequencySettings() {
    freqSettings.maxComboLines = parseInt(document.getElementById('maxComboLines').value) || 3;
    freqSettings.replyMinSec = parseFloat(document.getElementById('replyMinSec').value) || 3;
    freqSettings.replyMaxMin = parseFloat(document.getElementById('replyMaxMin').value) || 1.5;
    freqSettings.activeMaxMin = parseFloat(document.getElementById('activeMaxMin').value) || 5;
    freqSettings.activeToggle = document.getElementById('activeToggle').checked;
    freqSettings.mergeCardsToggle = document.getElementById('mergeCardsToggle').checked;
    saveAll(); renderProfile();
    alert("设置已保存");
    resetActiveMessageTimer(); 
}

function renderChatFromHistory() {
    chat.innerHTML = "";
    chatHistory.forEach(item => {
        let d=document.createElement("div");
        d.className="msg "+(item.side==="me"?"right":"");

        let contentHtml = (item.isHtml) ? item.text : `<div class="bubble">${item.text}${tailSvg}</div>`;
        
        // 渲染状态勾选图标
        let statusHtml = '';
        if (item.side === "me") {
            let isRead = item.status === '已读';
            let iconClass = isRead ? 'read-status read' : 'read-status unread';
            let iconSymbol = isRead ? '✓✓' : '✓';
            statusHtml = `<span class="${iconClass}">${iconSymbol}</span>`;
        }
        
        let timeDisplayHtml = item.time ? `<div class="msg-time">${item.time}</div>` : '';

        d.innerHTML=`
        <div class="msg-body">
            <div class="bubble-container">
                ${contentHtml}
            </div>
            ${statusHtml}
            ${timeDisplayHtml}
        </div>
        `;
        chat.appendChild(d);
    });
    chat.scrollTop=chat.scrollHeight;
}

function openSystem(){ systemPage.classList.add('show'); closeMenu(); renderProfile(); }
function closeSystem(){ systemPage.classList.remove('show'); }
function openManageCards(){ manageCardsPage.classList.add('show'); closeMenu(); renderGroups(); }
function closeManageCards(){ manageCardsPage.classList.remove('show'); }

function togglePanel(type) {
    let box = document.getElementById('panelBox');
    let plus = document.getElementById('plusPanel');
    let emoji = document.getElementById('emojiPanel');
    if (currentActivePanel === type) {
        closeAllPanels();
    } else {
        box.classList.add('show');
        if (type === 'plus') {
            plus.style.display = 'flex'; emoji.style.display = 'none';
        } else {
            plus.style.display = 'none'; emoji.style.display = 'flex';
        }
        currentActivePanel = type;
        setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 150);
    }
}

function closeAllPanels() {
    document.getElementById('panelBox').classList.remove('show');
    currentActivePanel = null;
}

function handleInput(el) {
    if(el.value.trim().length > 0) {
        sendBtn.style.display = 'flex';
    } else {
        sendBtn.style.display = 'none';
    }
}

function sendMe(){
    let t=txt.value.trim();
    if(!t)return;
    addMsg("me",t);
    txt.value="";
    sendBtn.style.display = 'none';
}

function addMsg(side,text,isHtml=false){
    let uniqueStatusId = "status_" + Date.now();
    let now = new Date();
    let timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    
    let msgObj = { side, text, isHtml, statusId: uniqueStatusId, status: '未读', time: timeStr };
    chatHistory.push(msgObj);
    saveAll(); 

    let d=document.createElement("div");
    d.className="msg "+(side==="me"?"right":"");

    let contentHtml = (isHtml && text.indexOf('img') > -1) ? text : `<div class="bubble">${text}${tailSvg}</div>`;
    
    // 渲染未读单勾
    let statusHtml = (side === "me") ? `<span class="read-status unread" id="${uniqueStatusId}">✓</span>` : '';

    d.innerHTML=`
    <div class="msg-body">
        <div class="bubble-container">
            ${contentHtml}
        </div>
        ${statusHtml}
        <div class="msg-time">${timeStr}</div>
    </div>
    `;
    chat.appendChild(d);
    chat.scrollTop=chat.scrollHeight;

    if (side === "me") {
        resetActiveMessageTimer();
        let randomDelay = Math.floor(Math.random() * 3 + 2) * 1000;
        setTimeout(function() {
            let statusEl = document.getElementById(uniqueStatusId);
            if (statusEl) {
                statusEl.className = "read-status read";
                statusEl.innerText = "✓✓"; // 转换为已读蓝色双勾
                let target = chatHistory.find(h => h.statusId === uniqueStatusId);
                if(target) target.status = '已读';
                saveAll();
                triggerAdvancedAutoReply();
            }
        }, randomDelay);
    }
}

/* 显示左侧三点浮动输入气泡 */
function showTypingBubble() {
    if (typingBubbleElement) return;
    typingBubbleElement = document.createElement("div");
    typingBubbleElement.className = "msg";
    typingBubbleElement.innerHTML = `
        <div class="msg-body">
            <div class="bubble-container">
                <div class="bubble typing-bubble">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    ${tailSvg}
                </div>
            </div>
        </div>
    `;
    chat.appendChild(typingBubbleElement);
    chat.scrollTop = chat.scrollHeight;
}

/* 隐藏输入气泡 */
function hideTypingBubble() {
    if (typingBubbleElement) {
        chat.removeChild(typingBubbleElement);
        typingBubbleElement = null;
    }
}

function triggerAdvancedAutoReply() {
    let allCards = [];
    groups.forEach(g => { if (g.cards) allCards = allCards.concat(g.cards); });
    if (allCards.length === 0) return;

    let userMaxLines = parseInt(freqSettings.maxComboLines) || 3;
    let bubbleCount = Math.floor(Math.random() * userMaxLines) + 1; 

    let bubbleQueue = [];
    for (let b = 0; b < bubbleCount; b++) {
        let cardsInBubbleCount = (freqSettings.mergeCardsToggle !== false) ? (Math.floor(Math.random() * 3) + 1) : 1; 
        let chosenCards = [];
        for (let c = 0; c < cardsInBubbleCount; c++) {
            chosenCards.push(allCards[Math.floor(Math.random() * allCards.length)]);
        }
        bubbleQueue.push(chosenCards.join(' '));
    }

    sendQueueItem(bubbleQueue, 0, 1500);
}

function sendQueueItem(queue, index, delayTime) {
    if (index >= queue.length) return;
    setTimeout(function() {
        showTypingBubble();

        setTimeout(function() {
            hideTypingBubble();
            addMsg("other", queue[index]);
            if (index + 1 < queue.length) {
                sendQueueItem(queue, index + 1, 1200);
            }
        }, 1500);
    }, delayTime);
}

function resetActiveMessageTimer() {
    if (activeMsgTimer) clearTimeout(activeMsgTimer);
    if (freqSettings.activeToggle === false) return;
    activeMsgTimer = setTimeout(() => { triggerAdvancedAutoReply(); }, (freqSettings.activeMaxMin || 5) * 60 * 1000);
}

function openCards(){
    cardPage.classList.add('show');
    closeAllPanels();
    let html='';
    groups.forEach(g=>{
        html+=`<div class="card"><h3>${g.name}</h3>`;
        g.cards.forEach(c=>{
            html+=`<div style="padding:10px 0;border-bottom:0.5px solid #e5e5ea;cursor:pointer" onclick="sendCard('${c}')">${c}</div>`;
        });
        html+='</div>';
    });
    cardArea.innerHTML = html;
}
function sendCard(t){ addMsg("other",t); closeCards(); }
function closeCards(){ cardPage.classList.remove('show'); }

renderProfile();
renderChatFromHistory();
resetActiveMessageTimer();
</script>
</body>
</html>
