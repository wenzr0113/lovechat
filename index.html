<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>情侣聊天-系统版</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{background:#ededed;height:100vh}
.header{height:56px;background:#f7f7f7;display:flex;justify-content:space-between;align-items:center;padding:0 15px;border-bottom:1px solid #ddd}
.chat{height:calc(100vh - 116px);overflow:auto;padding:10px}
.msg{display:flex;gap:8px;margin:12px 0;align-items:flex-start}
.right{justify-content:flex-end}
.avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;background:#ccc}
.bubble{max-width:65%;padding:10px 12px;border-radius:10px;background:#fff}
.right .bubble{background:#95ec69}
.footer{height:60px;display:flex;gap:8px;padding:10px;background:#f7f7f7}
.footer input{flex:1;padding:10px}
button{cursor:pointer; padding: 4px 8px; margin: 2px;}
.drawer{position:fixed;right:-300px;top:0;width:300px;height:100%;background:#fff;transition:.3s;z-index:10}
.drawer.show{right:0}
.item{padding:16px;border-bottom:1px solid #eee}
.page{position:fixed;left:100%;top:0;width:100%;height:100%;background:#f5f5f5;transition:.3s;overflow:auto;z-index:20}
.page.show{left:0}
.phead{background:#07c160;color:#fff;padding:15px}
.card{background:#fff;margin:10px;padding:12px;border-radius:8px}
.group{border:1px solid #ddd;padding:8px;margin:8px 0}
.small{font-size:12px;color:#666}
</style>
</head>
<body>

<div class="header">
<div id="partnerTitle">对方</div>
<div onclick="menu()">☰</div>
</div>

<div class="chat" id="chat"></div>

<div class="footer">
<input id="txt" placeholder="输入消息">
<button onclick="sendMe()">发送</button>
<button onclick="openCards()">🃏</button>
</div>

<div class="drawer" id="drawer">
<div class="item" onclick="openSystem()">⚙️ 系统</div>
<div class="item">💌 书信（待开发）</div>
<div class="item">📍 查岗（待开发）</div>
</div>

<div class="page" id="systemPage">
<div class="phead">← 系统</div>

<div class="card">
<h3>修改头像昵称</h3><br>
<div>我的头像</div>
<img id="meAvatarPreview" class="avatar"><br><br>
<input type="file" accept="image/*" onchange="avatarChange(event,'me')"><br><br>

<div>我的昵称</div>
<input id="meName"><br><br>

<div>对方头像</div>
<img id="partnerAvatarPreview" class="avatar"><br><br>
<input type="file" accept="image/*" onchange="avatarChange(event,'partner')"><br><br>

<div>对方昵称</div>
<input id="partnerName"><br><br>

<button onclick="saveProfile()">保存资料</button>
</div>

<div class="card">
<h3>字卡管理</h3><br>
<button onclick="addGroup()">新增分组</button>
<button onclick="document.getElementById('jsonFile').click()">导入JSON文件</button>
<input type="file" id="jsonFile" accept=".json" style="display:none" onchange="importJSON(event)">

<div id="groups"></div>
</div>

<div class="card">
<button onclick="closeSystem()">返回聊天</button>
</div>
</div>

<div class="page" id="cardPage">
<div class="phead">← 对方字卡回复</div>
<div id="cardArea"></div>
<div class="card"><button onclick="closeCards()">关闭</button></div>
</div>

<script>
let profile=JSON.parse(localStorage.getItem('profile')||'{"me":{"name":"我","avatar":""},"partner":{"name":"对方","avatar":""}}');
let groups=JSON.parse(localStorage.getItem('groups')||'[{"id":1,"name":"情话","cards":["抱抱","想你啦"]}]');

function saveAll(){
localStorage.setItem("profile",JSON.stringify(profile));
localStorage.setItem("groups",JSON.stringify(groups));
}

function menu(){
document.getElementById('drawer').classList.toggle('show');
}

function avatarChange(e,type){
let f=e.target.files[0];
if(!f)return;
let r=new FileReader();
r.onload=function(){
profile[type].avatar=r.result;
renderProfile();
saveAll();
}
r.readAsDataURL(f);
}

function renderProfile(){
meName.value=profile.me.name;
partnerName.value=profile.partner.name;
partnerTitle.innerText=profile.partner.name;

if(profile.me.avatar) meAvatarPreview.src=profile.me.avatar;
if(profile.partner.avatar) partnerAvatarPreview.src=profile.partner.avatar;
}

function saveProfile(){
profile.me.name=meName.value;
profile.partner.name=partnerName.value;
saveAll();
renderProfile();
alert("已保存");
}

function openSystem(){
systemPage.classList.add('show');
drawer.classList.remove('show');
renderGroups();
}

function closeSystem(){
systemPage.classList.remove('show');
}

function addGroup(){
let n=prompt("分组名称");
if(!n)return;
groups.push({id:Date.now(),name:n,cards:[]});
saveAll();
renderGroups();
}

function renderGroups(){
let html='';
groups.forEach(g=>{
html+=`
<div class="group">
<b>${g.name}</b>
<button onclick="addCard(${g.id})">+字卡</button>
<hr>
${g.cards.map((c,i)=>`
<div>${c}
<button onclick="delCard(${g.id},${i})">删除</button>
</div>`).join('')}
</div>`;
});
groupsEl=document.getElementById('groups');
groupsEl.innerHTML=html;
}

function addCard(id){
let t=prompt("字卡内容");
if(!t)return;
groups.find(x=>x.id===id).cards.push(t);
saveAll();
renderGroups();
}

function delCard(id,i){
groups.find(x=>x.id===id).cards.splice(i,1);
saveAll();
renderGroups();
}

// 导入 JSON 处理
function importJSON(e) {
    let file = e.target.files[0];
    if (!file) return;
    
    let reader = new FileReader();
    reader.onload = function(event) {
        try {
            let importedData = JSON.parse(event.target.result);
            if (!Array.isArray(importedData)) {
                alert("导入失败：JSON 格式不正确，应该是一个分组数组。");
                return;
            }
            
            importedData.forEach(item => {
                if (item.name && Array.isArray(item.cards)) {
                    let existingGroup = groups.find(g => g.name === item.name);
                    if (existingGroup) {
                        // 合并并去重
                        let mergedCards = [...new Set([...existingGroup.cards, ...item.cards])];
                        existingGroup.cards = mergedCards;
                    } else {
                        // 新增分组
                        groups.push({
                            id: Date.now() + Math.random(),
                            name: item.name,
                            cards: item.cards
                        });
                    }
                }
            });
            
            saveAll();
            renderGroups();
            alert("导入成功！");
        } catch (err) {
            alert("解析 JSON 文件失败，请检查文件格式。");
        }
        e.target.value = '';
    };
    reader.readAsText(file);
}

function sendMe(){
let t=txt.value.trim();
if(!t)return;
addMsg("me",t);
txt.value="";
}

function addMsg(side,text){
let d=document.createElement("div");
d.className="msg "+(side==="me"?"right":"");
let av=side==="me"?profile.me.avatar:profile.partner.avatar;
let name=side==="me"?profile.me.name:profile.partner.name;
d.innerHTML=`
${side==="other"?'<img class="avatar" src="'+(av||'')+'">':''}
<div>
<div class="small">${name}</div>
<div class="bubble">${text}</div>
</div>
${side==="me"?'<img class="avatar" src="'+(av||'')+'">':''}
`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

function openCards(){
cardPage.classList.add('show');
let html='';
groups.forEach(g=>{
html+=`<div class="card"><h3>${g.name}</h3>`;
g.cards.forEach(c=>{
html+=`<div style="padding:8px;border-bottom:1px solid #eee" onclick="sendCard('${c.replace(/'/g,'\\\'')}')">${c}</div>`;
});
html+='</div>';
});
cardArea.innerHTML=html;
}

function sendCard(t){
addMsg("other",t);
closeCards();
}

function closeCards(){
cardPage.classList.remove('show');
}

renderProfile();
</script>
</body>
</html>
